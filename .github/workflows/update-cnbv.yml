name: Update CNBV Data

# Trigger: Pame downloads the monthly CSV from portafolioinfo.cnbv.gob.mx manually,
# commits it to raw-data/ on main, and this workflow runs automatically.
#
# Flow:
#   1. Pame downloads files from the CNBV portal (Cloudflare-protected, no automation possible)
#   2. Commits raw-data files to main (directly or via PR merge)
#   3. This workflow detects the push and runs the normalization pipeline
#   4. Normalized data/ JSONs are committed and the app is deployed
#
# Manual trigger (workflow_dispatch) also available for re-runs or forced normalization.

on:
  push:
    branches: [main]
    paths:
      - 'raw-data/**.csv'
      - 'raw-data/**.json'
      - 'raw-data/**.zip'
      - 'raw-data/**.xlsx'

  workflow_dispatch:
    inputs:
      force_normalize:
        description: 'Force re-normalize even if raw-data unchanged'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  update-cnbv:
    name: Normalize CNBV data + commit + deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      changed: ${{ steps.commit.outputs.changed }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Normalize CNBV data
        id: normalize
        run: |
          CHANGED=false

          # normalize-cnbv.py reads raw-data/cnbv_indicadores.json + sofipos_by_inst.json
          if [ -f raw-data/cnbv_indicadores.json ] && [ -f raw-data/sofipos_by_inst.json ]; then
            echo "▶ Running normalize-cnbv.py..."
            python3 scripts/normalize-cnbv.py
            CHANGED=true
          else
            echo "⚠️  cnbv_indicadores.json or sofipos_by_inst.json not found — skipping credito/sofipos"
          fi

          # normalize-ifrs9.py reads raw-data/ifrs9_bm.zip or raw-data/ifrs9_040_R12A*.csv
          if ls raw-data/ifrs9_bm.zip raw-data/ifrs9_040_R12A*.csv 2>/dev/null | head -1 | grep -q .; then
            echo "▶ Running normalize-ifrs9.py..."
            python3 scripts/normalize-ifrs9.py
            CHANGED=true
          else
            echo "⚠️  No IFRS9 source found — skipping ifrs9"
          fi

          # normalize-imor-por-banco.py reads raw-data/sh_datos_40.csv (or versioned variant)
          if ls raw-data/sh_datos_40.csv raw-data/sh_datos_40_*.csv 2>/dev/null | head -1 | grep -q .; then
            echo "▶ Running normalize-imor-por-banco.py..."
            LATEST_SH=$(ls raw-data/sh_datos_40_*.csv 2>/dev/null | sort | tail -1)
            if [ -n "$LATEST_SH" ] && [ ! -f raw-data/sh_datos_40.csv ]; then
              ln -sf "$(basename $LATEST_SH)" raw-data/sh_datos_40.csv
            fi
            python3 scripts/normalize-imor-por-banco.py
            CHANGED=true
          else
            echo "⚠️  sh_datos_40.csv not found — skipping imor por banco"
          fi

          # normalize-capitalizacion.py — ICAP, CET1, LCR, NSFR
          if ls raw-data/boletin_capitalizacion.xlsx raw-data/reporte_liquidez.xlsx 2>/dev/null | head -1 | grep -q .; then
            echo "▶ Running normalize-capitalizacion.py..."
            pip3 install -q openpyxl
            python3 scripts/normalize-capitalizacion.py
            CHANGED=true
          else
            echo "⏭️  boletin_capitalizacion.xlsx / reporte_liquidez.xlsx not found — skipping capitalizacion/liquidez"
          fi

          echo "normalize_ran=$CHANGED" >> $GITHUB_OUTPUT

      - name: Merge into sfm-data.json
        if: ${{ steps.normalize.outputs.normalize_ran == 'true' || github.event.inputs.force_normalize == 'true' }}
        run: python3 scripts/merge-sfm-data.py

      - name: Setup Node.js for schema validation
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install app deps
        working-directory: app
        run: npm ci

      - name: Validate JSON schema
        run: node --experimental-strip-types app/scripts/validate-data.ts

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "sfm-monitor-bot"
          git config user.email "sfm-monitor@noreply.github.com"
          git add data/sfm-data.json data/credito.json data/sofipos.json data/ifrs9.json data/imor_por_banco.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            PERIOD=$(python3 -c "import json; d=json.load(open('data/credito.json')); print(d.get('ultima_actualizacion',''))" 2>/dev/null || echo "")
            git commit -m "data: update CNBV data${PERIOD:+ $PERIOD}"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

  deploy:
    name: Build + deploy app
    needs: update-cnbv
    if: needs.update-cnbv.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
