name: Update CNBV Data

# Strategy: manual-first + monthly reminder.
#
# The CNBV portal (portafolioinfo.cnbv.gob.mx) uses Cloudflare and does NOT
# expose stable downloadable URLs — filenames do not include the date and
# automated HEAD/GET requests are blocked. Auto-download is not feasible.
#
# Flow:
#   1. Day 1 of each month: checks if data for the current month already exists.
#      If yes → skips everything. If no → waits for manual upload.
#   2. Day 15: if data still missing → opens a GitHub Issue reminder.
#   3. MANUAL: Pame downloads from the portal, uploads to raw-data/, then
#      triggers this workflow via workflow_dispatch with skip_download=true.
#
# What this workflow does:
#   - Skips download step entirely (CNBV portal blocks automation)
#   - Uses already-committed raw-data/ files
#   - Runs normalize-cnbv.py → normalize-ifrs9.py → merge-sfm-data.py
#   - Validates schema, commits data/ JSONs, triggers deploy

on:
  schedule:
    # Day 1 of each month at 15:00 UTC (9 AM CDMX) — check if data is current
    - cron: '0 15 1 * *'
    # Day 15 — open alert if data still missing
    - cron: '0 15 15 * *'

  workflow_dispatch:
    inputs:
      force_normalize:
        description: 'Force re-normalize even if raw-data unchanged'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  update-cnbv:
    name: Fetch CNBV data + normalize + commit
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write   # needed to open alert issues

    outputs:
      changed: ${{ steps.commit.outputs.changed }}
      new_month: ${{ steps.detect.outputs.new_month }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check if current month data already exists
        id: detect
        # Skips the normalize steps if data is already up to date.
        # new_month=false → already have data, nothing to do.
        # new_month=true  → raw-data/ has been updated manually, proceed to normalize.
        run: |
          python3 << 'PYEOF'
          import os, json, sys
          from datetime import date

          today = date.today()
          current_period = f"{today.year}{today.month:02d}"

          credito_path = "data/credito.json"
          if os.path.exists(credito_path):
              with open(credito_path) as f:
                  credito = json.load(f)
              last_update = credito.get("ultima_actualizacion", "")
              last_period = last_update.replace("-", "") if last_update else ""
              if last_period >= current_period:
                  print(f"✅ Data already current for {current_period} (last: {last_period})")
                  with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                      f.write("new_month=false\n")
                  sys.exit(0)

          print(f"📋 No data yet for {current_period} — waiting for manual upload to raw-data/")
          # Check if raw-data has been recently updated (manual upload happened)
          import subprocess
          result = subprocess.run(
              ["git", "log", "-1", "--format=%ct", "--", "raw-data/"],
              capture_output=True, text=True
          )
          last_rawdata_ts = int(result.stdout.strip() or 0)
          # If raw-data was committed this month, proceed with normalization
          from datetime import timezone
          import datetime
          if last_rawdata_ts > 0:
              last_rawdata_date = datetime.datetime.fromtimestamp(last_rawdata_ts, tz=timezone.utc)
              if last_rawdata_date.year == today.year and last_rawdata_date.month == today.month:
                  print(f"📦 raw-data/ updated this month ({last_rawdata_date.date()}) — proceeding to normalize")
                  with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                      f.write("new_month=true\n")
                  sys.exit(0)

          print("⏳ raw-data/ not updated this month yet — skipping normalize")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("new_month=false\n")
          PYEOF

      - name: Check if alert is needed (day 15 with no data)
        id: alert_check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import os, json
          from datetime import date

          today = date.today()
          new_month = os.environ.get("new_month", "false")

          # Only alert on day 15 when still missing data
          if today.day != 15 or new_month == "true":
              print("No alert needed")
              raise SystemExit(0)

          # Check last known data period
          credito_path = "data/credito.json"
          current_period = f"{today.year}{today.month:02d}"
          last_period = ""
          if os.path.exists(credito_path):
              with open(credito_path) as f:
                  credito = json.load(f)
              last_update = credito.get("ultima_actualizacion", "")
              last_period = last_update.replace("-", "")

          if last_period >= current_period:
              print(f"Data is current ({last_period}), no alert needed")
              raise SystemExit(0)

          # Open GitHub issue via API
          import urllib.request, urllib.parse
          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["REPO"]
          url = f"https://api.github.com/repos/{repo}/issues"
          payload = json.dumps({
              "title": f"⚠️ CNBV data missing for {today.year}-{today.month:02d}",
              "body": (
                  f"El pipeline automático no encontró datos CNBV para "
                  f"**{today.year}-{today.month:02d}** después de 15 días de reintentos.\n\n"
                  f"**Acción requerida:** Descargar manualmente desde "
                  f"[Portafolio de Información CNBV]"
                  f"(https://portafolioinfo.cnbv.gob.mx), subir los archivos a `raw-data/` "
                  f"con un commit, y luego correr el workflow `Update CNBV Data` "
                  f"via workflow\_dispatch.\n\n"
                  f"Archivos necesarios:\n"
                  f"- `raw-data/sh_datos_40_YYYYMM.csv` (Sector 40 BM)\n"
                  f"- `raw-data/ifrs9_bm.zip` (R12A IFRS9, si hay nuevo mes)\n\n"
                  f"_Abierto automáticamente por el workflow `update-cnbv.yml`_"
              ),
              "labels": ["help wanted"],
          }).encode()
          req = urllib.request.Request(url, data=payload, method="POST")
          req.add_header("Authorization", f"Bearer {token}")
          req.add_header("Content-Type", "application/json")
          req.add_header("Accept", "application/vnd.github+json")
          with urllib.request.urlopen(req) as r:
              issue = json.loads(r.read())
          print(f"🚨 Alert issue opened: {issue['html_url']}")
          PYEOF
        env:
          new_month: ${{ steps.detect.outputs.new_month || 'false' }}

      - name: Normalize CNBV data
        id: normalize
        if: ${{ steps.detect.outputs.new_month == 'true' || github.event.inputs.force_normalize == 'true' }}
        run: |
          # Determine if there's anything to normalize
          CHANGED=false

          # normalize-cnbv.py reads raw-data/cnbv_indicadores.json + sofipos_by_inst.json
          if [ -f raw-data/cnbv_indicadores.json ] && [ -f raw-data/sofipos_by_inst.json ]; then
            echo "▶ Running normalize-cnbv.py..."
            python3 scripts/normalize-cnbv.py
            CHANGED=true
          else
            echo "⚠️  cnbv_indicadores.json or sofipos_by_inst.json not found — skipping credito/sofipos"
          fi

          # normalize-ifrs9.py reads raw-data/ifrs9_bm.zip or raw-data/ifrs9_040_R12A*.csv
          if ls raw-data/ifrs9_bm.zip raw-data/ifrs9_040_R12A*.csv 2>/dev/null | head -1 | grep -q .; then
            echo "▶ Running normalize-ifrs9.py..."
            python3 scripts/normalize-ifrs9.py
            CHANGED=true
          else
            echo "⚠️  No IFRS9 source found — skipping ifrs9"
          fi

          echo "normalize_ran=$CHANGED" >> $GITHUB_OUTPUT

      - name: Merge into sfm-data.json
        if: ${{ steps.normalize.outputs.normalize_ran == 'true' || github.event.inputs.force_normalize == 'true' }}
        run: |
          # Re-read existing Banxico data (sfm-data.json already has FX/Tasa/Inflacion)
          # merge-sfm-data.py adds credito/sofipos/ifrs9 on top
          python3 scripts/merge-sfm-data.py

      - name: Setup Node.js for schema validation
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install app deps
        working-directory: app
        run: npm ci

      - name: Validate JSON schema
        run: node --experimental-strip-types app/scripts/validate-data.ts

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "sfm-monitor-bot"
          git config user.email "sfm-monitor@noreply.github.com"
          git add data/sfm-data.json data/credito.json data/sofipos.json data/ifrs9.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            PERIOD=$(python3 -c "import json; d=json.load(open('data/credito.json')); print(d.get('ultima_actualizacion',''))" 2>/dev/null || echo "")
            git commit -m "data: update CNBV data${PERIOD:+ $PERIOD}"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

  deploy:
    name: Build + deploy app
    needs: update-cnbv
    if: needs.update-cnbv.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
