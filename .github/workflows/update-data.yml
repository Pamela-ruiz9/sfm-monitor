name: Update SFM Data

on:
  schedule:
    - cron: '0 14 * * 1-5'  # 8 AM CDMX (UTC-6) lunes a viernes
  workflow_dispatch:          # también se puede correr manualmente

jobs:
  update-data:
    name: Fetch + validate + commit data
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      changed: ${{ steps.commit.outputs.changed }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Banxico data
        env:
          BANXICO_TOKEN: ${{ secrets.BANXICO_TOKEN }}
          INEGI_TOKEN: ${{ secrets.INEGI_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os
          from datetime import date, timedelta

          def banxico_to_iso(fecha_str):
              """Convierte DD/MM/YYYY a YYYY-MM-DD"""
              if not fecha_str or fecha_str == 'N/E':
                  return None
              parts = fecha_str.split("/")
              if len(parts) == 3:
                  d, m, y = parts
                  if len(y) == 2:
                      y = "20" + y
                  return f"{y}-{m}-{d}"
              return fecha_str

          TOKEN = os.environ["BANXICO_TOKEN"]
          BASE = "https://www.banxico.org.mx/SieAPIRest/service/v1"

          def fetch(series_id, start, end=None):
              end = end or date.today().strftime("%Y-%m-%d")
              url = f"{BASE}/series/{series_id}/datos/{start}/{end}"
              req = urllib.request.Request(url, headers={"Bmx-Token": TOKEN})
              with urllib.request.urlopen(req, timeout=30) as r:
                  d = json.loads(r.read())
              return d["bmx"]["series"][0]["datos"]

          today = date.today().strftime("%Y-%m-%d")
          start_18m = (date.today() - timedelta(days=548)).strftime("%Y-%m-%d")
          start_3y = (date.today() - timedelta(days=1095)).strftime("%Y-%m-%d")
          start_1994 = "1994-01-01"

          # 1. Tipo de cambio FIX (SF43718) — histórico completo desde 1994
          # Banxico limita el rango por consulta; dividimos en chunks
          fx_chunks = [
              ("1994-01-01", "2002-12-31"),
              ("2003-01-01", "2012-12-31"),
              ("2013-01-01", "2020-12-31"),
              ("2021-01-01", date.today().strftime("%Y-%m-%d")),
          ]
          fx_daily = []
          for c_start, c_end in fx_chunks:
              fx_daily.extend(fetch("SF43718", c_start, c_end))
          fx_monthly = {}
          for x in fx_daily:
              d, m, y = x["fecha"].split("/")
              key = f"{y}-{m}"
              fx_monthly[key] = {"fecha": x["fecha"], "dato": x["dato"]}
          fx_series = sorted(fx_monthly.items())  # histórico completo

          # 2. Tasa objetivo (SF61745) — cambios únicos últimos 2 años
          tasa_daily = fetch("SF61745", (date.today() - timedelta(days=730)).strftime("%Y-%m-%d"))
          tasa_changes = []
          prev = None
          for x in tasa_daily:
              if x["dato"] != prev:
                  tasa_changes.append(x)
                  prev = x["dato"]

          # 3. Inflación anual calculada del INPC (SP74625)
          inpc_data = fetch("SP74625", (date.today() - timedelta(days=760)).strftime("%Y-%m-%d"))
          infl_anual = []
          for i in range(len(inpc_data)):
              d_now = inpc_data[i]["fecha"]
              parts = d_now.split("/")
              fecha_prev = f"{parts[0]}/{parts[1]}/{int(parts[2])-1}"
              for j in range(len(inpc_data)):
                  if inpc_data[j]["fecha"] == fecha_prev:
                      v = float(inpc_data[i]["dato"])
                      vp = float(inpc_data[j]["dato"])
                      pct = round((v - vp) / vp * 100, 2)
                      infl_anual.append({"fecha": d_now, "var_anual": pct})
                      break

          # 4. Reservas internacionales (SF43707) — semanal, últimas 52 semanas
          reservas_data = fetch("SF43707", (date.today() - timedelta(days=365)).strftime("%Y-%m-%d"))
          reservas_series = [
              {"fecha": banxico_to_iso(x["fecha"]), "valor": round(float(x["dato"].replace(",", "")), 2)}
              for x in reservas_data if x["dato"] not in ("N/E", None)
          ]

          # 5. TIIE Fondeo overnight (SF343410) — diaria, últimos 2 años
          tiie_fondeo = fetch("SF343410", (date.today() - timedelta(days=730)).strftime("%Y-%m-%d"))
          tiie_fondeo_changes = []
          prev = None
          for x in tiie_fondeo:
              if x["dato"] != prev:
                  tiie_fondeo_changes.append({"fecha": banxico_to_iso(x["fecha"]), "valor": float(x["dato"])})
                  prev = x["dato"]

          # 6. Cetes 28d subasta primaria (SF60633) — semanal, último año
          cetes_data = fetch("SF60633", (date.today() - timedelta(days=365)).strftime("%Y-%m-%d"))
          cetes_series = [
              {"fecha": banxico_to_iso(x["fecha"]), "valor": round(float(x["dato"]), 4)}
              for x in cetes_data if x["dato"] not in ("N/E", None)
          ]

          # 7. UDIs — valor diario (SP68257)
          udis_data = fetch("SP68257", (date.today() - timedelta(days=7)).strftime("%Y-%m-%d"))
          udis_actual = next((x for x in reversed(udis_data) if x["dato"] not in ("N/E", None)), None)

          # 8. Salario mínimo general (SF60628) — por cambio
          salmin_data = fetch("SF60628", "2010-01-01")
          salmin_changes = []
          prev = None
          for x in salmin_data:
              if x["dato"] != prev:
                  salmin_changes.append({"fecha": banxico_to_iso(x["fecha"]), "valor": float(x["dato"])})
                  prev = x["dato"]

          # 9 & 10. IGAE + PIB + Desocupación — INEGI BIE API
          # Series confirmadas (mayo 2026):
          #   737375 — PIB var. anual trimestral (base 2018, freq=4, unit=302)
          #   444774 — Tasa de desocupación nacional mensual (ENOE)
          # Nota: las claves de IGAE mensual cambiaron en dic 2025 (issue #21).
          # Se usa el PIB trimestral como indicador principal de actividad económica
          # hasta que INEGI publique la tabla de equivalencias actualizada.
          INEGI_TOKEN = os.environ.get("INEGI_TOKEN", "")
          INEGI_BASE = "https://www.inegi.org.mx/app/api/indicadores/desarrolladores/jsonxml/INDICATOR"

          def fetch_inegi(serie_id):
              """Consulta una serie del BIE de INEGI. Retorna lista de obs en orden ascendente."""
              if not INEGI_TOKEN:
                  print(f"⚠️  INEGI_TOKEN no configurado — saltando serie {serie_id}")
                  return []
              url = f"{INEGI_BASE}/{serie_id}/es/00/false/BIE-BISE/2.0/{INEGI_TOKEN}?type=json"
              try:
                  req = urllib.request.Request(url)
                  with urllib.request.urlopen(req, timeout=20) as r:
                      d = json.loads(r.read())
                  obs = d["Series"][0]["OBSERVATIONS"]
                  return list(reversed(obs))  # cronológico ascendente
              except Exception as e:
                  print(f"⚠️  INEGI serie {serie_id} error: {e}")
                  return []

          def inegi_periodo_to_iso(tp):
              """Convierte TIME_PERIOD INEGI a YYYY-MM o YYYY-QN según formato."""
              # Trimestral: '2025/04' → '2025-Q4'
              if "/" in tp and len(tp) == 7:
                  y, q = tp.split("/")
                  return f"{y}-Q{int(q)}"
              # Mensual: '2026/03' → '2026-03'
              if "/" in tp and len(tp) == 7:
                  y, m = tp.split("/")
                  return f"{y}-{m.zfill(2)}"
              return tp

          # PIB trimestral var. anual — serie 737375
          pib_obs = fetch_inegi("737375")
          pib_series = [
              {"fecha": inegi_periodo_to_iso(o["TIME_PERIOD"]), "valor": round(float(o["OBS_VALUE"]), 4)}
              for o in pib_obs if o.get("OBS_VALUE") not in (None, "")
          ]
          pib_latest = pib_series[-1] if pib_series else None

          # Tasa de desocupación mensual ENOE — serie 444774
          desoc_obs = fetch_inegi("444774")
          desoc_series = [
              {"fecha": o["TIME_PERIOD"].replace("/", "-"), "valor": round(float(o["OBS_VALUE"]), 4)}
              for o in desoc_obs if o.get("OBS_VALUE") not in (None, "")
          ]
          desoc_latest = desoc_series[-1] if desoc_series else None

          # IGAE var. anual mensual — serie 737370
          # Serie nueva post-dic-2025 confirmada: 737370 = IGAE var. anual mensual
          # actualizada hasta 2026-03 (verificado 25-may-2026)
          igae_obs = fetch_inegi("737370")
          igae_series = [
              {"fecha": o["TIME_PERIOD"].replace("/", "-"), "valor": round(float(o["OBS_VALUE"]), 4)}
              for o in igae_obs if o.get("OBS_VALUE") not in (None, "")
          ]
          igae_latest = igae_series[-1] if igae_series else None
          igae_var_anual = igae_latest["valor"] if igae_latest else None
          pib_var_anual = pib_latest["valor"] if pib_latest else None

          # Build JSON
          data = {
              "ultima_actualizacion": date.today().strftime("%Y-%m-%d"),
              "fuentes": {
                  "tipo_cambio": "Banxico SIE SF43718 - Tipo de cambio FIX",
                  "tasa_objetivo": "Banxico SIE SF61745 - Tasa objetivo",
                  "inflacion": "Banxico SIE SP74625 - INPC variación anual calculada"
              },
              "tipo_cambio": {
                  "actual": fx_series[-1][1]["dato"],
                  "fecha": banxico_to_iso(fx_series[-1][1]["fecha"]),
                  "historico_mensual": [{"mes": k, "valor": round(float(v["dato"]), 4)} for k, v in fx_series]
              },
              "tasa_banxico": {
                  "actual": tasa_changes[-1]["dato"],
                  "fecha": banxico_to_iso(tasa_changes[-1]["fecha"]),
                  "historico": [{"fecha": banxico_to_iso(x["fecha"]), "valor": float(x["dato"])} for x in tasa_changes[-20:]]
              },
              "inflacion": {
                  "actual": infl_anual[-1]["var_anual"] if infl_anual else None,
                  "fecha": banxico_to_iso(infl_anual[-1]["fecha"]) if infl_anual else None,
                  "historico_mensual": [{"mes": banxico_to_iso(x["fecha"])[:7], "fecha": banxico_to_iso(x["fecha"]), "valor": x["var_anual"]} for x in infl_anual[-24:]]
              }
          }

          data["mercado"] = {
              "reservas_internacionales": {
                  "actual": reservas_series[-1]["valor"] if reservas_series else None,
                  "fecha":  reservas_series[-1]["fecha"] if reservas_series else None,
                  "historico": reservas_series
              },
              "tiie_fondeo": {
                  "actual": tiie_fondeo_changes[-1]["valor"] if tiie_fondeo_changes else None,
                  "fecha":  tiie_fondeo_changes[-1]["fecha"] if tiie_fondeo_changes else None,
                  "historico": tiie_fondeo_changes[-20:]
              },
              "cetes_28d": {
                  "actual": cetes_series[-1]["valor"] if cetes_series else None,
                  "fecha":  cetes_series[-1]["fecha"] if cetes_series else None,
                  "historico": cetes_series
              },
              "udis": {
                  "actual": float(udis_actual["dato"]) if udis_actual else None,
                  "fecha":  banxico_to_iso(udis_actual["fecha"]) if udis_actual else None
              },
              "salario_minimo": {
                  "actual": salmin_changes[-1]["valor"] if salmin_changes else None,
                  "fecha":  salmin_changes[-1]["fecha"] if salmin_changes else None,
                  "historico": salmin_changes
              }
          }

          data["macro"] = {
              "igae": {
                  "actual": igae_latest["valor"] if igae_latest else None,
                  "fecha":  igae_latest["fecha"] if igae_latest else None,
                  "variacion_anual": igae_var_anual,
                  "historico": igae_series[-36:]  # últimos 3 años, serie 737370
              },
              "pib": {
                  "actual": pib_latest["valor"] if pib_latest else None,
                  "fecha":  pib_latest["fecha"] if pib_latest else None,
                  "variacion_anual": pib_var_anual,
                  "historico": pib_series[-20:]  # últimos 5 años trimestral
              },
              "desempleo": {
                  "actual": desoc_latest["valor"] if desoc_latest else None,
                  "fecha":  desoc_latest["fecha"] if desoc_latest else None,
                  "historico": desoc_series[-24:]  # últimos 2 años
              }
          }

          print(f"✅ IGAE var. anual: {igae_var_anual}% ({igae_latest['fecha'] if igae_latest else 'N/D'})")
          print(f"✅ PIB var. anual: {pib_var_anual}% ({pib_latest['fecha'] if pib_latest else 'N/D'})")
          print(f"✅ Desocupación: {desoc_latest['valor'] if desoc_latest else 'N/D'}% ({desoc_latest['fecha'] if desoc_latest else 'N/D'})")
          if not igae_series:
              print("⏭️  IGAE: pendiente clave actualizada INEGI dic-2025")

          os.makedirs("data", exist_ok=True)
          with open("data/sfm-data.json", "w") as f:
              json.dump(data, f, indent=2, ensure_ascii=False)

          print(f"✅ FX: {data['tipo_cambio']['actual']} ({data['tipo_cambio']['fecha']})")
          print(f"✅ Tasa: {data['tasa_banxico']['actual']}% ({data['tasa_banxico']['fecha']})")
          print(f"✅ Inflación: {data['inflacion']['actual']}% ({data['inflacion']['fecha']})")
          PYEOF

      - name: Setup Node.js for schema validation
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install app deps (for Zod schema)
        working-directory: app
        run: npm ci

      - name: Merge CNBV data into sfm-data.json
        # Merges data/credito.json + data/sofipos.json + data/ifrs9.json
        # into the Banxico base. Missing CNBV files are skipped gracefully
        # (ifrs9 uses empty stub until normalize-ifrs9.py has run).
        run: python3 scripts/merge-sfm-data.py

      - name: Validate JSON schema
        # Fails hard — bad data never reaches prod
        # Uses app/scripts/validate-data.ts (migrated in PR #10; closes #12)
        run: node --experimental-strip-types app/scripts/validate-data.ts

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "sfm-monitor-bot"
          git config user.email "sfm-monitor@noreply.github.com"
          git add data/sfm-data.json data/credito.json data/sofipos.json data/ifrs9.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "data: auto-update Banxico data $(date +%Y-%m-%d)"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

  deploy:
    name: Build + deploy app
    needs: update-data
    if: needs.update-data.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
