name: Update SFM Data

on:
  schedule:
    - cron: '0 14 * * 1-5'  # 8 AM CDMX (UTC-6) lunes a viernes
  workflow_dispatch:          # también se puede correr manualmente

jobs:
  update-data:
    name: Fetch + validate + commit data
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      changed: ${{ steps.commit.outputs.changed }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Banxico data
        env:
          BANXICO_TOKEN: ${{ secrets.BANXICO_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os
          from datetime import date, timedelta

          def banxico_to_iso(fecha_str):
              """Convierte DD/MM/YYYY a YYYY-MM-DD"""
              if not fecha_str or fecha_str == 'N/E':
                  return None
              parts = fecha_str.split("/")
              if len(parts) == 3:
                  d, m, y = parts
                  if len(y) == 2:
                      y = "20" + y
                  return f"{y}-{m}-{d}"
              return fecha_str

          TOKEN = os.environ["BANXICO_TOKEN"]
          BASE = "https://www.banxico.org.mx/SieAPIRest/service/v1"

          def fetch(series_id, start, end=None):
              end = end or date.today().strftime("%Y-%m-%d")
              url = f"{BASE}/series/{series_id}/datos/{start}/{end}"
              req = urllib.request.Request(url, headers={"Bmx-Token": TOKEN})
              with urllib.request.urlopen(req, timeout=30) as r:
                  d = json.loads(r.read())
              return d["bmx"]["series"][0]["datos"]

          today = date.today().strftime("%Y-%m-%d")
          start_18m = (date.today() - timedelta(days=548)).strftime("%Y-%m-%d")
          start_3y = (date.today() - timedelta(days=1095)).strftime("%Y-%m-%d")

          # 1. Tipo de cambio FIX (SF43718) — últimos 18 meses
          fx_daily = fetch("SF43718", start_18m)
          fx_monthly = {}
          for x in fx_daily:
              d, m, y = x["fecha"].split("/")
              key = f"{y}-{m}"
              fx_monthly[key] = {"fecha": x["fecha"], "dato": x["dato"]}
          fx_series = sorted(fx_monthly.items())[-18:]

          # 2. Tasa objetivo (SF61745) — cambios únicos últimos 2 años
          tasa_daily = fetch("SF61745", (date.today() - timedelta(days=730)).strftime("%Y-%m-%d"))
          tasa_changes = []
          prev = None
          for x in tasa_daily:
              if x["dato"] != prev:
                  tasa_changes.append(x)
                  prev = x["dato"]

          # 3. Inflación anual calculada del INPC (SP74625)
          inpc_data = fetch("SP74625", (date.today() - timedelta(days=760)).strftime("%Y-%m-%d"))
          infl_anual = []
          for i in range(len(inpc_data)):
              d_now = inpc_data[i]["fecha"]
              parts = d_now.split("/")
              fecha_prev = f"{parts[0]}/{parts[1]}/{int(parts[2])-1}"
              for j in range(len(inpc_data)):
                  if inpc_data[j]["fecha"] == fecha_prev:
                      v = float(inpc_data[i]["dato"])
                      vp = float(inpc_data[j]["dato"])
                      pct = round((v - vp) / vp * 100, 2)
                      infl_anual.append({"fecha": d_now, "var_anual": pct})
                      break

          # Build JSON
          data = {
              "ultima_actualizacion": date.today().strftime("%Y-%m-%d"),
              "fuentes": {
                  "tipo_cambio": "Banxico SIE SF43718 - Tipo de cambio FIX",
                  "tasa_objetivo": "Banxico SIE SF61745 - Tasa objetivo",
                  "inflacion": "Banxico SIE SP74625 - INPC variación anual calculada"
              },
              "tipo_cambio": {
                  "actual": fx_series[-1][1]["dato"],
                  "fecha": banxico_to_iso(fx_series[-1][1]["fecha"]),
                  "historico_mensual": [{"mes": k, "valor": round(float(v["dato"]), 4)} for k, v in fx_series]
              },
              "tasa_banxico": {
                  "actual": tasa_changes[-1]["dato"],
                  "fecha": banxico_to_iso(tasa_changes[-1]["fecha"]),
                  "historico": [{"fecha": banxico_to_iso(x["fecha"]), "valor": float(x["dato"])} for x in tasa_changes[-20:]]
              },
              "inflacion": {
                  "actual": infl_anual[-1]["var_anual"] if infl_anual else None,
                  "fecha": banxico_to_iso(infl_anual[-1]["fecha"]) if infl_anual else None,
                  "historico_mensual": [{"mes": banxico_to_iso(x["fecha"])[:7], "fecha": banxico_to_iso(x["fecha"]), "valor": x["var_anual"]} for x in infl_anual[-24:]]
              }
          }

          os.makedirs("data", exist_ok=True)
          with open("data/sfm-data.json", "w") as f:
              json.dump(data, f, indent=2, ensure_ascii=False)

          print(f"✅ FX: {data['tipo_cambio']['actual']} ({data['tipo_cambio']['fecha']})")
          print(f"✅ Tasa: {data['tasa_banxico']['actual']}% ({data['tasa_banxico']['fecha']})")
          print(f"✅ Inflación: {data['inflacion']['actual']}% ({data['inflacion']['fecha']})")
          PYEOF

      - name: Setup Node.js for schema validation
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install app deps (for Zod schema)
        working-directory: app
        run: npm ci

      - name: Validate JSON schema
        # Fails hard — bad data never reaches prod
        # Uses app/scripts/validate-data.ts (migrated in PR #10; closes #12)
        run: node --experimental-strip-types app/scripts/validate-data.ts

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "sfm-monitor-bot"
          git config user.email "sfm-monitor@noreply.github.com"
          git add data/sfm-data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "data: auto-update Banxico data $(date +%Y-%m-%d)"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

  deploy:
    name: Build + deploy app
    needs: update-data
    if: needs.update-data.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
