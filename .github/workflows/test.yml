name: test

on:
  pull_request:
    paths: ['app/**', '.github/workflows/test.yml']
  push:
    branches: [main]
    paths: ['app/**', '.github/workflows/test.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install
        run: npm ci

      - name: Type check + build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('app/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: E2E tests (excludes visual regression — snapshots are darwin-only)
        run: npm run test:e2e -- --project=desktop --grep-invert "visual"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 7

      - name: Lighthouse CI
        run: npm run lighthouse
        continue-on-error: true
